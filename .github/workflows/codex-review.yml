name: Codex Review

on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

concurrency:
  group: codex-review-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Validate OPENAI_API_KEY
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "::error::OPENAI_API_KEY is empty or not available to this workflow."
            exit 1
          fi

      - name: Validate OpenAI API auth
        run: |
          status=$(curl -s -o /tmp/openai_auth.json -w "%{http_code}" \
            https://api.openai.com/v1/models \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}")
          if [ "$status" != "200" ]; then
            echo "::error::OpenAI API auth failed with HTTP $status"
            cat /tmp/openai_auth.json
            exit 1
          fi

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@main
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/review_prompt.md
          codex-args: >-
            --quiet

  post-review:
    runs-on: ubuntu-latest
    needs: review
    if: needs.review.outputs.final_message != '' && github.event_name == 'pull_request'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Upsert Codex comment
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- codex-review-comment -->';
            const body = `${marker}\n## Codex Review\n\n${process.env.CODEX_FINAL_MESSAGE}`;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) =>
              c.user?.type === 'Bot' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }



